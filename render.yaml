applyTemplates: true

services:
  # Backend API — Node/Express. Root Directory must be `server` so
  # `node server.js` resolves; this is what deploy log 127e98c's build
  # failure was missing (Render was building from the repo root instead).
  - type: web
    name: farmevidence-api
    runtime: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: PYTHON_SERVICE_URL
        sync: false

  # Chart-rendering microservice — FastAPI/uvicorn. No env vars of its own.
  # Free plan is fine here (secondary service, occasional cold-start on
  # chart requests after idle is an acceptable tradeoff) — keep the
  # backend on a paid plan so the primary API stays always-on.
  - type: web
    name: farmevidence-charts
    runtime: python
    plan: free
    rootDir: python-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  # Frontend — CRA static build. Root Directory `client` so
  # `npm run build` runs against client/package.json (react-scripts),
  # not the monorepo root.
  - type: static
    name: farmevidence-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: REACT_APP_API_BASE_URL
        sync: false
